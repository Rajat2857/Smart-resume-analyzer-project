<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile Settings</title>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#020202,#021b1e,#022f36);
  color: #fff;
}

/* CONTAINER */
.container {
  max-width: 720px;
  margin: 50px auto;
  padding: 0 16px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

/* PROFILE TOP */
.profile-card {
  display: flex;
  align-items: center;
  gap: 16px;
}

/* AVATAR (MAN ICON) */
.avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid #00e6d0;
  flex: 0 0 70px;
}
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TEXT */
h2 { margin: 0 0 4px 0; }
p { margin: 0; color: #cfd8dc; }

/* INPUTS */
label { display: block; margin-top: 10px; font-size: 14px; color: #b0bec5; }
input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color: #fff;
  outline: none;
}

/* BUTTONS */
.row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}
.btn, .editBtn {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}
.editBtn {
  background: #00e6d0;
  color: #002b2b;
  
}
.card {
  position: relative;
}

.editBtn {
  position: absolute;
  top: 15px;     
  right: 15px;   
}
.btn {
  background: linear-gradient(135deg,#00e6d0,#00bfa5);
  color: #002b2b;
  display: none;
}

/* LOGOUT */
.logout {
  border: 1px solid red;
  color: red;
  text-align: center;
  padding: 14px;
  border-radius: 14px;
  cursor: pointer;
}   
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  margin-top: 20px;
  padding-left: 20px;
}
.back {
  font-size: 22px;
  cursor: pointer;
  color: #00e6d0;
}

.title {
  font-size: 20px;
  font-weight: bold;
}
.status {
  display: inline-block;
  background: rgba(0, 224, 208, 0.2);
  color: #00e6d0;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 5px;
}
</style>
</head>

<body>
<div class="header">
  <span class="back" onclick="goBack()">←</span>
  <span class="title">Profile Settings</span>
</div>
<div class="container">

  <!-- PROFILE TOP -->
  <div class="card profile-card">
    
    <div class="avatar">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="avatar">
    </div>
    <div>
      <h2 id="profileName">Name</h2>
      <p id="profileEmail">email@gmail.com</p>
      <span class="status">Active User</span>
    </div>
    
  </div>

  <!-- PERSONAL INFO -->
  <div class="card">
    <h3>Personal Information</h3>
    <button id="editBtn" class="editBtn">Edit</button>

    <label>Name</label>
    <input id="editName" disabled>

    <label>Email</label>
    <input id="editEmail" disabled>

    <label>Joined</label>
    <input id="joined" disabled>

    <div class="row">
      
      <button id="saveBtn" class="btn">Save Changes</button>
    </div>
  </div>

  <!-- LOGOUT -->
  <div id="logoutBtn" class="logout">Sign Out</div>

</div>

<script src="../js/profile.js">

</script>

</body>
</html>
