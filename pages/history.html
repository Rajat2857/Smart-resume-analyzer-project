<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  background:#000;
  color:white;
}


.title{
  text-align:center;
  padding:20px;
  font-size:22px;
  font-weight:600;
  background:#1a1a1a;
  border-bottom:1px solid #333;
}


.empty{
  height:80vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#888;
}

.empty i{
  font-size:60px;
  margin-bottom:15px;
}

.empty h3{
  margin-bottom:8px;
  font-weight:500;
}

.empty p{
  font-size:14px;
}

.history-list{
  padding:20px;
}

.history-card{
  background:#111827;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 0 15px rgba(0,0,0,0.25);
}

.history-card h3{
  margin-bottom:10px;
  font-size:18px;
}

.history-meta{
  display:flex;
  justify-content:space-between;
  color:#aaa;
  font-size:14px;
  margin-top:10px;
}

.score-badge{
  display:inline-block;
  margin-top:10px;
  padding:6px 14px;
  border-radius:20px;
  background:#00c6ff22;
  color:#00c6ff;
  font-weight:bold;
}

#clearHistoryBtn{
  margin:20px auto;
  display:block;
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#ff4d4d;
  color:white;
  cursor:pointer;
  font-size:14px;
}
</style>
</head>

<body>

<div class="title">
  <a href="project.html" style="color: #888;">
    <i class="fa-solid fa-arrow-left"></i>
  </a>
  Analysis History
</div>
<button id="clearHistoryBtn">🗑 Clear History</button>

<div id="historyContainer"></div>

<script src="../js/history.js"></script>
</body>
</html>
