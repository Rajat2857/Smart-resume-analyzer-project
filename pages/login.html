<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.08);
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      backdrop-filter: blur(12px);
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h2 {
      color: white;
      margin-bottom: 5px;
    }

    p {
      color: #ccc;
      font-size: 14px;
    }

    .social-btn {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .google { background: white; }
    .github { background: #333; color: white; }

    .divider {
      margin: 15px 0;
      color: #aaa;
    }

    .input-group {
      text-align: left;
      margin: 15px 0;
      color: white;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-top: 5px;
      box-sizing: border-box;
      outline: none;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 40px;
    }

    .eye-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .eye-icon svg {
      stroke: #555;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #00c6ff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    a {
      color: #00c6ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

<form id="loginForm">
  <div class="login-container">

    <h2>Welcome Back 👋</h2>
    <p>Login to your Resume Analyzer</p>

    <button type="button" class="social-btn google">Continue with Google</button>
    <button type="button" class="social-btn github">Continue with GitHub</button>

    <div class="divider">OR</div>

    <div class="input-group">
      <label>Email:</label>
      <input type="email" id="email" placeholder="user@gmail.com" required>
    </div>

    <div class="input-group">
      <label>Password:</label>

      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" required>

        <!-- ✅ Eye Icon -->
        <span class="eye-icon" id="eye">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="#555" stroke-width="2" viewBox="0 0 24 24">
            <!-- Closed eye (default) -->
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
            <line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </span>
      </div>

    </div>

    <button type="submit" class="login-btn">Login</button>

    <p style="margin-top:15px;">
      Don’t have an account?
      <a href="signup.html">Sign up</a>
    </p>

  </div>
</form>

<script src="../js/auth.js"></script>

<script>
const eye = document.getElementById("eye");
const pass = document.getElementById("password");
const eyeIcon = document.getElementById("eyeIcon");

eye.addEventListener("click", () => {
  if (pass.type === "password") {
    pass.type = "text";

    eyeIcon.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
      <circle cx="12" cy="12" r="3"/>
    `;
  } else {
    pass.type = "password";

    eyeIcon.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
      <circle cx="12" cy="12" r="3"/>
      <line x1="2" y1="2" x2="22" y2="22"/>
    `;
  }
});
</script>

</body>
</html>
